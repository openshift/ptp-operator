name: Upstream Sync
on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run upstream sync
        run: hack/upstream-sync.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add or remove GitHub usernames as needed
          REVIEWERS: |
            nocturnalastro
            vitus133
            josephdrichard
            jzding
            lack
            sebsoto
